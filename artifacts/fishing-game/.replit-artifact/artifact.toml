kind = "web"
previewPath = "/"
title = "Fishing Frenzy"
version = "1.0.0"
id = "artifacts/fishing-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23771

[services.development]
run = "pnpm --filter @workspace/fishing-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fishing-game", "run", "build" ]
publicDir = "artifacts/fishing-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23771"
BASE_PATH = "/"
